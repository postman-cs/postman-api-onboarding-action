name: Postman API Onboarding
description: 'Full Postman onboarding in one step: workspace bootstrap, repo sync, and optional Insights linking. Part of the Postman API Onboarding suite.'
author: Postman
branding:
  icon: send
  color: orange
inputs:

  workspace-id:
    description: Existing Postman workspace ID.
    required: false
  spec-id:
    description: Existing Postman spec ID.
    required: false
  baseline-collection-id:
    description: Existing baseline collection ID.
    required: false
  smoke-collection-id:
    description: Existing smoke collection ID.
    required: false
  contract-collection-id:
    description: Existing contract collection ID.
    required: false
  sync-examples:
    description: Whether linked spec/collection relations should enable example syncing.
    required: false
    default: 'true'
  collection-sync-mode:
    description: Collection lifecycle policy (refresh or version). Default refresh ensures tracked collections stay in sync with the spec.
    required: false
    default: refresh
  spec-sync-mode:
    description: Spec lifecycle policy (update or version).
    required: false
    default: update
  release-label:
    description: Optional release label for versioned specs and collections. When omitted during versioned sync, derived from GitHub tag or branch metadata.
    required: false
  monitor-id:
    description: Existing smoke monitor ID. When set, the action validates and reuses this monitor instead of creating a new one.
    required: false
  mock-url:
    description: Existing mock server URL. When set, the action validates and reuses this mock instead of creating a new one.
    required: false
  monitor-cron:
    description: Cron expression for monitor scheduling (e.g. '0 */6 * * *'). When empty, the monitor is created disabled and triggered to run once per workflow invocation (and once on every subsequent run).
    required: false
    default: ""
  generate-ci-workflow:
    description: Whether to generate the CI workflow file.
    required: false
    default: "true"
  ci-workflow-path:
    description: Path to write the generated CI workflow file.
    required: false
    default: .github/workflows/ci.yml
  project-name:
    description: Service project name used across bootstrap and repo sync phases.
    required: true
  domain:
    description: Business domain used for governance assignment.
    required: false
  domain-code:
    description: Short domain code used in workspace naming.
    required: false
  governance-group:
    description: Postman governance workspace group name. Overrides the postman-governance-group repository custom property and domain mapping.
    required: false
  requester-email:
    description: Requester email used for workspace membership.
    required: false
  workspace-admin-user-ids:
    description: Comma-separated workspace admin user ids.
    required: false
  workspace-team-id:
    description: Numeric sub-team ID for org-mode workspace creation. Required by the Postman API when the PMAK's team is scoped under an organization.
    required: false
  spec-url:
    description: HTTPS URL to the OpenAPI document to bootstrap. Provide either spec-url or spec-path.
    required: false
  spec-path:
    description: Repo-root-relative path to the local spec file. Used for repo metadata generation and, when spec-url is not provided, as the spec source for bootstrap (read directly from the checked-out workspace).
    required: false
  breaking-change-mode:
    description: OpenAPI breaking-change comparison mode passed through to bootstrap (off, pr-native, baseline-only, or previous-spec).
    required: false
    default: 'off'
  breaking-baseline-spec-path:
    description: Repo-root-relative baseline OpenAPI spec path used by bootstrap baseline-only mode and pr-native fallback.
    required: false
  breaking-rules-path:
    description: Repo-root-relative openapi-changes rules file passed through to bootstrap. Missing files are ignored.
    required: false
    default: changes-rules.yaml
  breaking-target-ref:
    description: Optional target branch or git ref override for bootstrap pr-native breaking-change comparisons.
    required: false
  breaking-summary-path:
    description: Optional markdown breaking-change report path. Defaults to a bootstrap runner-temp file.
    required: false
    default: ''
  breaking-log-path:
    description: Optional raw breaking-change log path. Defaults to a bootstrap runner-temp file.
    required: false
    default: ''
  environments-json:
    description: JSON array of environment slugs to materialize.
    required: false
    default: '["prod"]'
  system-env-map-json:
    description: JSON map of environment slug to system environment id.
    required: false
    default: '{}'
  environment-uids-json:                                                                                                                                                                                                                                                                             
    description: JSON map of environment slug to existing Postman environment UID. When provided, repo-sync reuses these environments instead of creating new ones.                                                                                                                                  
    required: false                                                                                                                                                                                                                                                                                  
    default: '{}'      
  governance-mapping-json:
    description: JSON map of business domain to governance group name.
    required: false
    default: '{}'
  env-runtime-urls-json:
    description: JSON map of environment slug to runtime base URL.
    required: false
    default: '{}'
  postman-api-key:
    description: Postman API key (PMAK). Threaded to the wrapped actions to mint and re-mint the access token and to authenticate the Postman CLI logins (bootstrap spec lint, repo-sync generated-CI collection run). Individually optional; at least one of postman-api-key or postman-access-token is required.
    required: false
  postman-access-token:
    description: Postman access token (x-access-token). Primary credential threaded to the wrapped actions; every Postman asset operation runs through the access-token gateway. Mint it with postman-resolve-service-token-action. Individually optional; at least one of postman-api-key or postman-access-token is required.
    required: false
  credential-preflight:
    description: "Credential identity preflight policy forwarded to bootstrap, repo sync, and insights. warn (default) logs a note and continues when postman-api-key and postman-access-token resolve to different parent orgs; enforce fails the run on that condition before any workspace is created."
    required: false
    default: warn
  postman-team-id:
    description: Explicit Postman team ID override for org-mode integration calls.
    required: false
  postman-region:
    description: Postman data residency region for public API and Postman CLI calls. One of us or eu.
    required: false
    default: us
  postman-stack:
    description: 'Postman stack profile. Use prod for Marketplace workflows; EU data residency requires prod.'
    required: false
    default: prod
  github-token:
    description: GitHub token used for repo variables and generated commits.
    required: false
  gh-fallback-token:
    description: Fallback GitHub token for variable and workflow-file APIs.
    required: false
  repo-write-mode:
    description: Repo mutation mode for generated assets and workflow files. One of none, commit-only, or commit-and-push.
    required: false
    default: commit-and-push
  current-ref:
    description: Explicit ref override for detached checkout push semantics.
    required: false
  committer-name:
    description: Commit author name for generated sync commits.
    required: false
    default: Postman
  committer-email:
    description: Commit author email for generated sync commits.
    required: false
    default: support@postman.com
  enable-insights:
    description: Whether to enable Postman Insights.
    required: false
    default: 'false'
  skip-built-in-tests:
    description: |
      When 'true', skip the built-in smoke and contract Postman CLI test run
      and JUnit artifact upload that normally happen inside this action. Set
      this to 'true' when the caller workflow needs to perform additional
      post-onboarding setup (e.g. bearer-token injection, mTLS bootstrap,
      vault-hydrated secrets, dynamic env enrichment) before the smoke and
      contract suites can authenticate successfully, and will run the tests
      itself afterward. Default 'false' preserves existing behavior for all
      current callers.
    required: false
    default: 'false'
  cluster-name:
    description: Insights cluster name passed to the downstream Insights onboarding step.
    required: false
  integration-backend:
    description: Advanced/internal. Integration backend used to coordinate onboarding phases; leave unset to use the default.
    required: false
  org-mode:
    description: Whether the Postman team uses org-mode. When true, x-entity-team-id is included on integration calls. Non-org teams must omit this header.
    required: false
    default: 'false'
  ssl-client-cert:
    description: Base64-encoded PEM client certificate for mTLS. Passed through to repo-sync for CI workflow generation.
    required: false
  ssl-client-key:
    description: Base64-encoded PEM client private key. Passed through to repo-sync.
    required: false
  ssl-client-passphrase:
    description: Passphrase for encrypted private key. Passed through to repo-sync.
    required: false
  ssl-extra-ca-certs:
    description: Base64-encoded PEM additional CA certificates. Passed through to repo-sync.
    required: false
outputs:
  integration-backend:
    description: Resolved integration backend for the onboarding run.
    value: ${{ inputs.integration-backend }}
  workspace-id:
    description: Postman workspace ID.
    value: ${{ steps.bootstrap.outputs.workspace-id }}
  workspace-url:
    description: Postman workspace URL.
    value: ${{ steps.bootstrap.outputs.workspace-url }}
  spec-id:
    description: Uploaded Postman spec ID.
    value: ${{ steps.bootstrap.outputs.spec-id }}
  collections-json:
    description: JSON summary of generated collections.
    value: ${{ steps.bootstrap.outputs.collections-json }}
  breaking-change-status:
    description: OpenAPI breaking-change check status from bootstrap.
    value: ${{ steps.bootstrap.outputs.breaking-change-status }}
  breaking-change-summary-json:
    description: JSON summary of the OpenAPI breaking-change check from bootstrap.
    value: ${{ steps.bootstrap.outputs.breaking-change-summary-json }}
  environment-uids-json:
    description: JSON map of environment slug to Postman environment uid.
    value: ${{ steps.repo_sync.outputs.environment-uids-json }}
  mock-url:
    description: Mock server URL.
    value: ${{ steps.repo_sync.outputs.mock-url }}
  monitor-id:
    description: Smoke monitor ID.
    value: ${{ steps.repo_sync.outputs.monitor-id }}
  repo-sync-summary-json:
    description: JSON summary of repo materialization and workspace sync planning.
    value: ${{ steps.repo_sync.outputs.repo-sync-summary-json }}
  commit-sha:
    description: Commit SHA produced by repo-write-mode.
    value: ${{ steps.repo_sync.outputs.commit-sha }}
  bootstrap-outcome:
    description: GitHub Actions runner outcome for the bootstrap step.
    value: ${{ steps.bootstrap.outcome }}
  repo-sync-outcome:
    description: GitHub Actions runner outcome for the repo sync step.
    value: ${{ steps.repo_sync.outcome }}
  insights-outcome:
    description: GitHub Actions runner outcome for the Insights onboarding step.
    value: ${{ steps.insights_onboarding.outcome }}
  insights-status:
    description: Insights onboarding status (success, not-found, error, or empty if insights disabled).
    value: ${{ steps.insights_onboarding.outputs.status }}
  insights-verification-token:
    description: Team verification token for Insights DaemonSet configuration.
    value: ${{ steps.insights_onboarding.outputs.verification-token }}
  insights-application-id:
    description: Insights application binding ID.
    value: ${{ steps.insights_onboarding.outputs.application-id }}
  insights-discovered-service-id:
    description: Discovered service ID from Insights agent.
    value: ${{ steps.insights_onboarding.outputs.discovered-service-id }}
  insights-discovered-service-name:
    description: Discovered service name from Insights agent.
    value: ${{ steps.insights_onboarding.outputs.discovered-service-name }}
  insights-collection-id:
    description: Insights API Catalog collection ID.
    value: ${{ steps.insights_onboarding.outputs.collection-id }}
runs:
  using: composite
  steps:
    - id: validate_postman_stack
      name: Validate Postman stack and region
      shell: bash
      env:
        POSTMAN_TEAM_ID: ${{ inputs.postman-team-id }}
        POSTMAN_REGION: ${{ inputs.postman-region }}
        POSTMAN_STACK: ${{ inputs.postman-stack }}
        CREDENTIAL_PREFLIGHT: ${{ inputs.credential-preflight }}
        REPO_WRITE_MODE: ${{ inputs.repo-write-mode }}
        POSTMAN_API_KEY: ${{ inputs.postman-api-key }}
        POSTMAN_ACCESS_TOKEN: ${{ inputs.postman-access-token }}
      run: |
        case "$POSTMAN_STACK" in
          prod|beta) ;;
          *)
            echo "::error::postman-stack must be one of: prod, beta; got: $POSTMAN_STACK"
            exit 1
            ;;
        esac
        case "$POSTMAN_REGION" in
          us|eu) ;;
          *)
            echo "::error::postman-region must be one of: us, eu; got: $POSTMAN_REGION"
            exit 1
            ;;
        esac
        if [ "$POSTMAN_STACK" = "beta" ] && [ "$POSTMAN_REGION" = "eu" ]; then
          echo "::error::postman-region=eu is only supported with postman-stack=prod."
          exit 1
        fi
        case "$CREDENTIAL_PREFLIGHT" in
          warn|enforce) ;;
          *)
            echo "::error::credential-preflight must be one of: warn, enforce; got: $CREDENTIAL_PREFLIGHT"
            exit 1
            ;;
        esac
        case "$REPO_WRITE_MODE" in
          none|commit-only|commit-and-push) ;;
          *)
            echo "::error::repo-write-mode must be one of: none, commit-only, commit-and-push; got: $REPO_WRITE_MODE"
            exit 1
            ;;
        esac
        if [ -z "$POSTMAN_API_KEY" ] && [ -z "$POSTMAN_ACCESS_TOKEN" ]; then
          echo "::error::One of postman-api-key or postman-access-token is required."
          exit 1
        fi
    - id: bootstrap
      name: Bootstrap Postman Assets
      uses: postman-cs/postman-bootstrap-action@v2.9.9
      env:
        POSTMAN_TEAM_ID: ${{ inputs.postman-team-id }}
      with:
        project-name: ${{ inputs.project-name }}
        workspace-id: ${{ inputs.workspace-id }}
        spec-id: ${{ inputs.spec-id }}
        baseline-collection-id: ${{ inputs.baseline-collection-id }}
        smoke-collection-id: ${{ inputs.smoke-collection-id }}
        contract-collection-id: ${{ inputs.contract-collection-id }}
        sync-examples: ${{ inputs.sync-examples }}
        collection-sync-mode: ${{ inputs.collection-sync-mode }}
        spec-sync-mode: ${{ inputs.spec-sync-mode }}
        release-label: ${{ inputs.release-label }}
        domain: ${{ inputs.domain }}
        domain-code: ${{ inputs.domain-code }}
        governance-group: ${{ inputs.governance-group }}
        requester-email: ${{ inputs.requester-email }}
        workspace-admin-user-ids: ${{ inputs.workspace-admin-user-ids }}
        workspace-team-id: ${{ inputs.workspace-team-id }}
        spec-url: ${{ inputs.spec-url }}
        # Only forward spec-path to bootstrap when spec-url is empty so that
        # legacy callers passing both (spec-url for bootstrap, spec-path for
        # repo metadata) keep working under the bootstrap action's one-of
        # contract.
        spec-path: ${{ inputs.spec-url == '' && inputs.spec-path || '' }}
        breaking-change-mode: ${{ inputs.breaking-change-mode }}
        breaking-baseline-spec-path: ${{ inputs.breaking-baseline-spec-path }}
        breaking-rules-path: ${{ inputs.breaking-rules-path }}
        breaking-target-ref: ${{ inputs.breaking-target-ref }}
        breaking-summary-path: ${{ inputs.breaking-summary-path }}
        breaking-log-path: ${{ inputs.breaking-log-path }}
        governance-mapping-json: ${{ inputs.governance-mapping-json }}
        github-token: ${{ inputs.github-token }}
        gh-fallback-token: ${{ inputs.gh-fallback-token }}
        postman-api-key: ${{ inputs.postman-api-key }}
        postman-access-token: ${{ inputs.postman-access-token }}
        credential-preflight: ${{ inputs.credential-preflight }}
        integration-backend: ${{ inputs.integration-backend }}
        postman-region: ${{ inputs.postman-region }}
        postman-stack: ${{ inputs.postman-stack }}
    - id: repo_sync
      name: Sync Repository and Workspace
      uses: postman-cs/postman-repo-sync-action@v2.1.7
      env:
        POSTMAN_TEAM_ID: ${{ inputs.postman-team-id }}
      with:
        project-name: ${{ inputs.project-name }}
        workspace-id: ${{ steps.bootstrap.outputs.workspace-id }}
        baseline-collection-id: ${{ steps.bootstrap.outputs.baseline-collection-id }}
        smoke-collection-id: ${{ steps.bootstrap.outputs.smoke-collection-id }}
        contract-collection-id: ${{ steps.bootstrap.outputs.contract-collection-id }}
        collection-sync-mode: ${{ inputs.collection-sync-mode }}
        spec-sync-mode: ${{ inputs.spec-sync-mode }}
        release-label: ${{ inputs.release-label }}
        generate-ci-workflow: ${{ inputs.generate-ci-workflow }}
        ci-workflow-path: ${{ inputs.ci-workflow-path }}
        environments-json: ${{ inputs.environments-json }}
        system-env-map-json: ${{ inputs.system-env-map-json }}
        environment-uids-json: ${{ inputs.environment-uids-json }}
        env-runtime-urls-json: ${{ inputs.env-runtime-urls-json }}
        repo-write-mode: ${{ inputs.repo-write-mode }}
        current-ref: ${{ inputs.current-ref }}
        committer-name: ${{ inputs.committer-name }}
        committer-email: ${{ inputs.committer-email }}
        postman-api-key: ${{ inputs.postman-api-key }}
        postman-access-token: ${{ inputs.postman-access-token }}
        credential-preflight: ${{ inputs.credential-preflight }}
        github-token: ${{ inputs.github-token }}
        gh-fallback-token: ${{ inputs.gh-fallback-token }}
        org-mode: ${{ inputs.org-mode }}
        integration-backend: ${{ inputs.integration-backend }}
        postman-region: ${{ inputs.postman-region }}
        monitor-id: ${{ inputs.monitor-id }}
        mock-url: ${{ inputs.mock-url }}
        monitor-cron: ${{ inputs.monitor-cron }}
        ssl-client-cert: ${{ inputs.ssl-client-cert }}
        ssl-client-key: ${{ inputs.ssl-client-key }}
        ssl-client-passphrase: ${{ inputs.ssl-client-passphrase }}
        ssl-extra-ca-certs: ${{ inputs.ssl-extra-ca-certs }}
        spec-id: ${{ steps.bootstrap.outputs.spec-id }}
        spec-path: ${{ inputs.spec-path }}
        postman-stack: ${{ inputs.postman-stack }}
    - id: warn_tests_skipped_no_api_key
      name: Warn when built-in tests are skipped because no Postman API key is present
      # D2: the built-in test step authenticates the Postman CLI with
      # `postman login --with-api-key`, which has no access-token login path. When
      # postman-api-key is absent (access-token-primary runs), skip the tests with
      # a warning instead of failing the run.
      if: ${{ steps.bootstrap.outputs.collections-json != '' && inputs.skip-built-in-tests != 'true' && inputs.postman-api-key == '' }}
      shell: bash
      env:
        POSTMAN_TEAM_ID: ${{ inputs.postman-team-id }}
      run: |
        echo "::warning::Skipping built-in smoke and contract tests: no postman-api-key was provided. The Postman CLI (postman login --with-api-key, then postman collection run) has no access-token login, so these tests require a PMAK. Provide postman-api-key to enable them, or set skip-built-in-tests: true to silence this warning."
    - id: run_tests_junit
      name: Run smoke and contract collections with JUnit output
      if: ${{ steps.bootstrap.outputs.collections-json != '' && inputs.skip-built-in-tests != 'true' && inputs.postman-api-key != '' }}
      shell: bash
      continue-on-error: true
      env:
        POSTMAN_TEAM_ID: ${{ inputs.postman-team-id }}
        POSTMAN_API_KEY: ${{ inputs.postman-api-key }}
        POSTMAN_REGION: ${{ inputs.postman-region }}
        COLLECTIONS_JSON: ${{ steps.bootstrap.outputs.collections-json }}
        ENVIRONMENT_UIDS_JSON: ${{ steps.repo_sync.outputs.environment-uids-json }}
        POSTMAN_CLI_INSTALL_URL: ${{ inputs.postman-stack == 'beta' && 'https://dl-cli.pstmn-beta.io/install/unix.sh' || 'https://dl-cli.pstmn.io/install/unix.sh' }}
      run: |
        set +e
        mkdir -p "$RUNNER_TEMP/postman-junit"

        if ! command -v postman >/dev/null 2>&1; then
          curl -fsSL "$POSTMAN_CLI_INSTALL_URL" | sh
          export PATH="$HOME/.postman/cli:$PATH"
        fi

        if ! command -v jq >/dev/null 2>&1; then
          echo "::error::jq is required to parse Postman collection and environment IDs"
          exit 1
        fi

        if [ "$POSTMAN_REGION" = "eu" ]; then
          postman login --with-api-key "$POSTMAN_API_KEY" --region eu >/dev/null 2>&1 || true
        else
          postman login --with-api-key "$POSTMAN_API_KEY" >/dev/null 2>&1 || true
        fi

        SMOKE=$(printf '%s' "$COLLECTIONS_JSON"    | jq -r '.smoke // empty')
        CONTRACT=$(printf '%s' "$COLLECTIONS_JSON" | jq -r '.contract // empty')
        ENV_UID=$(printf '%s' "$ENVIRONMENT_UIDS_JSON" | jq -r 'to_entries | (.[0].value // empty)')

        ENV_FLAG=()
        if [ -n "$ENV_UID" ]; then
          ENV_FLAG=(-e "$ENV_UID")
        fi

        if [ -n "$SMOKE" ]; then
          postman collection run "$SMOKE" "${ENV_FLAG[@]}" \
            --reporters cli,junit \
            --reporter-junit-export "$RUNNER_TEMP/postman-junit/smoke.xml" || true
        fi

        if [ -n "$CONTRACT" ]; then
          postman collection run "$CONTRACT" "${ENV_FLAG[@]}" \
            --reporters cli,junit \
            --reporter-junit-export "$RUNNER_TEMP/postman-junit/contract.xml" || true
        fi
    - id: upload_junit_artifact
      name: Upload Postman JUnit results
      if: always() && inputs.skip-built-in-tests != 'true'
      env:
        POSTMAN_TEAM_ID: ${{ inputs.postman-team-id }}
      uses: actions/upload-artifact@v7.0.1
      with:
        name: postman-test-results
        path: ${{ runner.temp }}/postman-junit/*.xml
        if-no-files-found: ignore
    - id: insights_onboarding
      if: inputs.enable-insights == 'true'
      name: Onboard Postman Insights
      uses: postman-cs/postman-insights-onboarding-action@v2.1.2
      env:
        POSTMAN_TEAM_ID: ${{ inputs.postman-team-id }}
      with:
        project-name: ${{ inputs.project-name }}
        workspace-id: ${{ steps.bootstrap.outputs.workspace-id }}
        environment-id: ${{ fromJSON(steps.repo_sync.outputs.environment-uids-json)[fromJSON(inputs.environments-json)[0]] }}
        system-environment-id: ${{ fromJSON(inputs.system-env-map-json)[fromJSON(inputs.environments-json)[0]] }}
        cluster-name: ${{ inputs.cluster-name }}
        postman-api-key: ${{ inputs.postman-api-key }}
        postman-access-token: ${{ inputs.postman-access-token }}
        credential-preflight: ${{ inputs.credential-preflight }}
        postman-team-id: ${{ inputs.postman-team-id }}
        github-token: ${{ inputs.github-token }}
        postman-region: ${{ inputs.postman-region }}
        postman-stack: ${{ inputs.postman-stack }}
